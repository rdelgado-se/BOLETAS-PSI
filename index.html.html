<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSI ROV & MARÍTIMO SERVICE - Control de Boleta</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/1.5.3/signature_pad.min.js"></script>
    <style>
        .signature-canvas {
            border: 2px dashed #cbd5e1;
            background-color: #f8fafc;
            touch-action: none;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-3 md:p-6">

    <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden p-5 space-y-6">
        
        <div class="flex flex-col items-center border-b border-slate-200 pb-5 text-center">
            <svg class="w-16 h-16 text-blue-900 mb-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                <path d="M2 12h20" />
            </svg>
            <h1 class="text-2xl font-black text-blue-900 tracking-wider">PSI ROV & MARÍTIMO SERVICE</h1>
            <p class="text-xs font-bold text-slate-500 uppercase mt-1 tracking-widest">Control de Boleta de Servicio</p>
        </div>

        <form id="formBoleta" class="space-y-5">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="sm:col-span-2">
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Nombre de la Empresa</label>
                    <input type="text" id="empresa" placeholder="Ej: PSI ROV & Marítimo Service" class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-50 p-2.5 text-sm focus:border-blue-600 focus:bg-white focus:ring-2 focus:ring-blue-100 outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Fecha de Operación</label>
                    <input type="date" id="fecha" class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-50 p-2.5 text-sm font-medium focus:border-blue-600 focus:bg-white focus:ring-2 focus:ring-blue-100 outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Nombre del Centro</label>
                    <input type="text" id="centro" placeholder="Ej: Centro Apiao" class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-50 p-2.5 text-sm focus:border-blue-600 focus:bg-white focus:ring-2 focus:ring-blue-100 outline-none" required>
                </div>
                <div class="sm:col-span-2">
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Nombre de Piloto ROV</label>
                    <input type="text" id="piloto" placeholder="Ej: Juan Pérez" class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-50 p-2.5 text-sm focus:border-blue-600 focus:bg-white focus:ring-2 focus:ring-blue-100 outline-none" required>
                </div>
            </div>

            <div class="space-y-4">
                <span class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Actividades y Condiciones de Faena</span>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                    <div class="flex items-center">
                        <input type="checkbox" id="chkInspeccion" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                        <label for="chkInspeccion" class="ml-2 text-sm font-bold text-slate-700 uppercase cursor-pointer">🔍 Inspección</label>
                    </div>
                    <div id="divObsInspeccion" class="hidden">
                        <label class="block text-xs font-semibold text-slate-600 uppercase">Observaciones de Inspección (Sin límite de caracteres)</label>
                        <textarea id="obsInspeccion" rows="3" placeholder="Detalle los hallazgos de la inspección..." class="mt-1 block w-full rounded-lg border border-slate-300 bg-white p-2.5 text-sm focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none"></textarea>
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                    <div class="flex items-center">
                        <input type="checkbox" id="chkMortalidad" class="w-4 h-4 text-amber-600 border-slate-300 rounded focus:ring-amber-500 cursor-pointer">
                        <label for="chkMortalidad" class="ml-2 text-sm font-bold text-amber-900 uppercase cursor-pointer">🐟 Extracción de Mortalidad</label>
                    </div>
                    <div id="divObsMortalidad" class="hidden">
                        <label class="block text-xs font-semibold text-amber-800 uppercase">Observaciones de Extracción (Sin límite de caracteres)</label>
                        <textarea id="obsMortalidad" rows="3" placeholder="Detalle cantidad, módulos o condiciones de la extracción..." class="mt-1 block w-full rounded-lg border border-slate-300 bg-white p-2.5 text-sm focus:border-amber-600 focus:ring-2 focus:ring-amber-100 outline-none"></textarea>
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                    <div class="flex items-center">
                        <input type="checkbox" id="chkPuerto" class="w-4 h-4 text-red-600 border-slate-300 rounded focus:ring-red-500 cursor-pointer">
                        <label for="chkPuerto" class="ml-2 text-sm font-bold text-red-800 uppercase cursor-pointer">⚠️ Operación con Puerto Cerrado</label>
                    </div>
                    <div id="divObsPuerto" class="hidden">
                        <label class="block text-xs font-semibold text-red-700 uppercase">Observaciones por Puerto Cerrado (Sin límite de caracteres)</label>
                        <textarea id="obsPuerto" rows="3" placeholder="Describa los motivos, condiciones climáticas o la autorización especial..." class="mt-1 block w-full rounded-lg border border-slate-300 bg-white p-2.5 text-sm focus:border-red-500 focus:ring-2 focus:ring-red-100 outline-none"></textarea>
                    </div>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Capturar Evidencia Fotográfica</label>
                <input type="file" id="foto" accept="image/*" capture="environment" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 file:cursor-pointer">
                <div id="previewContainer" class="mt-3 hidden text-center">
                    <img id="imgPreview" class="max-h-44 mx-auto rounded-lg shadow-md border border-slate-300">
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                    <span class="block text-xs font-bold text-slate-700 uppercase tracking-wider border-b border-slate-200 pb-1">Validación Piloto ROV</span>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-2xs font-bold text-slate-500 uppercase">Nombre Completo</label>
                            <input type="text" id="nombrePilotoFirma" class="mt-0.5 block w-full rounded-md border border-slate-300 bg-white p-2 text-xs outline-none" required>
                        </div>
                        <div>
                            <label class="block text-2xs font-bold text-slate-500 uppercase">RUT</label>
                            <input type="text" id="rutPilotoFirma" placeholder="12.345.678-9" class="mt-0.5 block w-full rounded-md border border-slate-300 bg-white p-2 text-xs outline-none" required>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-2xs font-bold text-slate-500 uppercase">Trazado de Firma</label>
                            <button type="button" id="clearPiloto" class="text-2xs font-bold text-red-500 hover:underline">Limpiar</button>
                        </div>
                        <canvas id="canvasPiloto" class="signature-canvas w-full h-24 rounded-lg shadow-inner"></canvas>
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                    <span class="block text-xs font-bold text-slate-700 uppercase tracking-wider border-b border-slate-200 pb-1">Validación Encargado de Centro</span>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-2xs font-bold text-slate-500 uppercase">Nombre Completo</label>
                            <input type="text" id="nombreEncargadoFirma" class="mt-0.5 block w-full rounded-md border border-slate-300 bg-white p-2 text-xs outline-none" required>
                        </div>
                        <div>
                            <label class="block text-2xs font-bold text-slate-500 uppercase">RUT</label>
                            <input type="text" id="rutEncargadoFirma" placeholder="12.345.678-9" class="mt-0.5 block w-full rounded-md border border-slate-300 bg-white p-2 text-xs outline-none" required>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-2xs font-bold text-slate-500 uppercase">Trazado de Firma</label>
                            <button type="button" id="clearEncargado" class="text-2xs font-bold text-red-500 hover:underline">Limpiar</button>
                        </div>
                        <canvas id="canvasEncargado" class="signature-canvas w-full h-24 rounded-lg shadow-inner"></canvas>
                    </div>
                </div>
            </div>

            <button type="submit" id="btnEnviar" class="w-full bg-blue-900 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:bg-blue-950 active:scale-[0.99] transition duration-150 uppercase tracking-widest text-xs cursor-pointer">
                Enviar Reporte a Supervisor
            </button>
        </form>
    </div>

    <script>
        // Tu URL de producción de Google Apps Script suministrada anteriormente
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbWZla9ukRIpD76UODdLmbt1AjtgddgnEznEIyj0_2NUt5NTEqBT4fHLK4grOgudauGWQ/exec";

        // Fijar fecha de hoy
        document.getElementById('fecha').value = new Date().toISOString().substring(0, 10);

        // --- MANEJO DINÁMICO DE CASILLAS Y CAMPOS DE OBSERVACIÓN ---
        function configurarCheckCondicional(chkId, divId, txtId) {
            const checkbox = document.getElementById(chkId);
            const contenedor = document.getElementById(divId);
            const textarea = document.getElementById(txtId);

            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    contenedor.classList.remove('hidden');
                    textarea.setAttribute('required', 'true');
                } else {
                    contenedor.classList.add('hidden');
                    textarea.removeAttribute('required');
                    textarea.value = "";
                }
            });
        }

        configurarCheckCondicional('chkInspeccion', 'divObsInspeccion', 'obsInspeccion');
        configurarCheckCondicional('chkMortalidad', 'divObsMortalidad', 'obsMortalidad');
        configurarCheckCondicional('chkPuerto', 'divObsPuerto', 'obsPuerto');

        // Captura y renderizado de la fotografía
        document.getElementById('foto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('imgPreview');
                    img.src = event.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // --- MANEJO DE CANVAS PARA FIRMAS ---
        const cPiloto = document.getElementById('canvasPiloto');
        const cEncargado = document.getElementById('canvasEncargado');

        const padPiloto = new SignaturePad(cPiloto, { backgroundColor: 'rgba(255, 255, 255, 0)', penColor: 'rgb(30, 41, 59)' });
        const padEncargado = new SignaturePad(cEncargado, { backgroundColor: 'rgba(255, 255, 255, 0)', penColor: 'rgb(30, 41, 59)' });

        document.getElementById('clearPiloto').addEventListener('click', () => padPiloto.clear());
        document.getElementById('clearEncargado').addEventListener('click', () => padEncargado.clear());

        function recalibrarPantallaFirmas() {
            [cPiloto, cEncargado].forEach(canvas => {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
            });
            padPiloto.clear();
            padEncargado.clear();
        }
        window.addEventListener("resize", recalibrarPantallaFirmas);
        window.addEventListener("DOMContentLoaded", recalibrarPantallaFirmas);

        // --- ENVÍO Y GENERACIÓN DEL PDF ---
        document.getElementById('formBoleta').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Al menos una casilla debe estar seleccionada
            if (!document.getElementById('chkInspeccion').checked && 
                !document.getElementById('chkMortalidad').checked && 
                !document.getElementById('chkPuerto').checked) {
                alert("⚠️ Debe seleccionar al menos una Actividad/Condición de Faena antes de enviar.");
                return;
            }

            if (padPiloto.isEmpty() || padEncargado.isEmpty()) {
                alert("⚠️ Las firmas manuscritas de ambos responsables son requeridas.");
                return;
            }

            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "GENERANDO PDF CORPORATIVO...";
            btn.classList.replace('bg-blue-900', 'bg-slate-400');

            try {
                const { jsPDF } = window.jspdf;
                const docPdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

                // Datos recolectados
                const dataEmpresa = document.getElementById('empresa').value;
                const dataFecha = document.getElementById('fecha').value;
                const dataCentro = document.getElementById('centro').value;
                const dataPiloto = document.getElementById('piloto').value;
                const dataFoto = document.getElementById('imgPreview').src || "";

                // Estilo visual del PDF corporativo
                docPdf.setFillColor(30, 58, 138); 
                docPdf.rect(0, 0, 210, 32, 'F');

                docPdf.setTextColor(255, 255, 255);
                docPdf.setFont("helvetica", "bold");
                docPdf.setFontSize(16);
                docPdf.text(dataEmpresa.toUpperCase(), 15, 13);
                docPdf.setFontSize(10);
                docPdf.setFont("helvetica", "normal");
                docPdf.text("CONTROL INTERNO DE BOLETA DE SERVICIO MARÍTIMO", 15, 22);

                // Bloque Informativo Principal
                docPdf.setTextColor(51, 65, 85);
                docPdf.setFontSize(11);
                docPdf.setFont("helvetica", "bold");
                docPdf.text("1. ANTECEDENTES GENERALES", 15, 45);
                
                docPdf.setFont("helvetica", "normal");
                docPdf.text(`Fecha Ejecución: ${dataFecha}`, 15, 53);
                docPdf.text(`Centro Logístico: ${dataCentro}`, 15, 60);
                docPdf.text(`Piloto Operador ROV: ${dataPiloto}`, 15, 67);

                let currentY = 76;

                // Agregar bloques de observaciones de forma dinámica si están activos
                docPdf.setFont("helvetica", "bold");
                docPdf.text("2. DESARROLLO Y REPORTE DE FAENAS", 15, currentY);
                currentY += 6;

                docPdf.setFont("helvetica", "normal");
                if (document.getElementById('chkInspeccion').checked) {
                    docPdf.setFont("helvetica", "bold"); docPdf.text("• INSPECCIÓN:", 15, currentY); docPdf.setFont("helvetica", "normal");
                    let lineas = docPdf.splitTextToSize(document.getElementById('obsInspeccion').value, 175);
                    docPdf.text(lineas, 15, currentY + 5);
                    currentY += 10 + (lineas.length * 5);
                }

                if (document.getElementById('chkMortalidad').checked) {
                    docPdf.setFont("helvetica", "bold"); docPdf.text("• EXTRACCIÓN DE MORTALIDAD:", 15, currentY); docPdf.setFont("helvetica", "normal");
                    let lineas = docPdf.splitTextToSize(document.getElementById('obsMortalidad').value, 175);
                    docPdf.text(lineas, 15, currentY + 5);
                    currentY += 10 + (lineas.length * 5);
                }

                if (document.getElementById('chkPuerto').checked) {
                    docPdf.setTextColor(185, 28, 28);
                    docPdf.setFont("helvetica", "bold"); docPdf.text("• REPORTE DE PUERTO CERRADO:", 15, currentY); docPdf.setFont("helvetica", "normal");
                    let lineas = docPdf.splitTextToSize(document.getElementById('obsPuerto').value, 175);
                    docPdf.text(lineas, 15, currentY + 5);
                    docPdf.setTextColor(51, 65, 85);
                    currentY += 10 + (lineas.length * 5);
                }

                // Salto de página preventivo si queda poco espacio para foto y firmas
                if (currentY > 200) { docPdf.addPage(); currentY = 20; }

                // Inyección de imagen de evidencia fotográfica
                if (dataFoto) {
                    docPdf.setFont("helvetica", "bold");
                    docPdf.text("3. RESPALDO VISUAL", 15, currentY);
                    try {
                        docPdf.addImage(dataFoto, 'JPEG', 15, currentY + 4, 70, 50);
                    } catch(e){}
                    currentY += 60;
                }

                if (currentY > 230) { docPdf.addPage(); currentY = 20; }

                // Inserción de bloques de firmas definitivas con Nombre y RUT
                docPdf.setFont("helvetica", "bold");
                docPdf.text("4. FIRMAS Y REGISTRO DE IDENTIDAD", 15, currentY);
                
                const fPiloto = padPiloto.toDataURL();
                const fEncargado = padEncargado.toDataURL();

                // Firmante 1: Piloto
                docPdf.addImage(fPiloto, 'PNG', 15, currentY + 4, 65, 20);
                docPdf.setDrawColor(203, 213, 225);
                docPdf.line(15, currentY + 25, 80, currentY + 25);
                docPdf.setFontSize(8.5);
                docPdf.text(`Nombre: ${document.getElementById('nombrePilotoFirma').value}`, 15, currentY + 29);
                docPdf.text(`RUT: ${document.getElementById('rutPilotoFirma').value}`, 15, currentY + 33);
                docPdf.setFont("helvetica", "bold");
                docPdf.text("PILOTO ROV RESPONSABLE", 15, currentY + 37);

                // Firmante 2: Encargado
                docPdf.setFont("helvetica", "normal");
                docPdf.addImage(fEncargado, 'PNG', 120, currentY + 4, 65, 20);
                docPdf.line(120, currentY + 25, 185, currentY + 25);
                docPdf.text(`Nombre: ${document.getElementById('nombreEncargadoFirma').value}`, 120, currentY + 29);
                docPdf.text(`RUT: ${document.getElementById('rutEncargadoFirma').value}`, 120, currentY + 33);
                docPdf.setFont("helvetica", "bold");
                docPdf.text("ENCARGADO DE CENTRO", 120, currentY + 37);

                // Convertir documento a Base64 string
                const pdfBase64Data = docPdf.output('datauristring');

                // Consolidación del JSON comprimido para enviar a la base de datos externa de Apps Script
                const payload = {
                    fecha: dataFecha,
                    centro: dataCentro,
                    faena: `${document.getElementById('chkInspeccion').checked ? 'Inspección ' : ''}${document.getElementById('chkMortalidad').checked ? 'Extracción_Mortalidad ' : ''}`,
                    puertoCerrado: document.getElementById('chkPuerto').checked ? "SÍ" : "NO",
                    // Concatenación ordenada de notas para almacenar en una única celda de observaciones de Sheets
                    observacion: `[INSPECCIÓN]: ${document.getElementById('obsInspeccion').value || 'N/A'} | [MORTALIDAD]: ${document.getElementById('obsMortalidad').value || 'N/A'} | [PUERTO]: ${document.getElementById('obsPuerto').value || 'N/A'}`,
                    fotoBase64: dataFoto,
                    pdfBase64: pdfBase64Data
                };

                // Despacho a Google Sheets y Gmail vía Web App Script
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                alert("✅ ¡Excelente! Boleta enviada con éxito. El reporte y firmas quedaron guardados en Google Sheets y despachados por correo.");
                
                // Reiniciar formulario y ocultar campos dinámicos
                document.getElementById('formBoleta').reset();
                document.getElementById('fecha').value = new Date().toISOString().substring(0, 10);
                ['divObsInspeccion', 'divObsMortalidad', 'divObsPuerto'].forEach(id => document.getElementById(id).classList.add('hidden'));
                document.getElementById('previewContainer').classList.add('hidden');
                padPiloto.clear(); padEncargado.clear();

            } catch (err) {
                console.error(err);
                alert("❌ Falló el envío automático: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "ENVIAR REPORTE A SUPERVISOR";
                btn.classList.replace('bg-slate-400', 'bg-blue-900');
            }
        });
    </script>
</body>
</html>
