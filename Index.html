<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSI ROV & MARÍTIMO SERVICE - Boleta de Servicio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/1.5.3/signature_pad.min.js"></script>
    <style>
        .signature-canvas {
            border: 2px dashed #cbd5e1;
            background-color: #f8fafc;
            touch-action: none;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-3 md:p-6">

    <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden p-5 space-y-6">
        
        <div class="text-center border-b border-slate-200 pb-4">
            <h1 class="text-2xl font-black text-blue-900 tracking-wider">PSI ROV & MARÍTIMO SERVICE</h1>
            <p class="text-xs font-bold text-slate-500 uppercase mt-1 tracking-widest">Control de Boleta de Servicio</p>
        </div>

        <form id="formBoleta" class="space-y-5">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Fecha de Operación</label>
                    <input type="date" id="fecha" class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-50 p-2.5 text-sm font-medium focus:border-blue-600 focus:bg-white focus:ring-2 focus:ring-blue-100 outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Nombre del Centro</label>
                    <input type="text" id="centro" placeholder="Ej: Centro Apiao" class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-50 p-2.5 text-sm focus:border-blue-600 focus:bg-white focus:ring-2 focus:ring-blue-100 outline-none" required>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <span class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-3">Tipo de Faena</span>
                <div class="flex flex-col sm:flex-row sm:items-center space-y-2 sm:space-y-0 sm:space-x-6">
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="tipoFaena" value="Inspección" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500" checked>
                        <span class="ml-2 text-sm text-slate-700 font-semibold">Inspección</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="tipoFaena" value="Extracción de Mortalidad" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                        <span class="ml-2 text-sm text-slate-700 font-semibold">Extracción de Mortalidad</span>
                    </label>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                <div class="flex items-center">
                    <input type="checkbox" id="puertoCerrado" class="w-4 h-4 text-red-600 border-slate-300 rounded focus:ring-red-500 cursor-pointer">
                    <label for="puertoCerrado" class="ml-2 text-sm font-bold text-red-800 uppercase cursor-pointer tracking-wide">⚠️ Operación con Puerto Cerrado</label>
                </div>
                
                <div id="contenedorObservacion" class="hidden transition-all duration-300">
                    <label class="block text-xs font-bold text-red-700 uppercase tracking-wider">Motivo / Observación por Puerto Cerrado</label>
                    <textarea id="observacion" rows="3" placeholder="Describa brevemente las condiciones climáticas o motivos del cierre..." class="mt-1 block w-full rounded-lg border border-slate-300 bg-white p-2.5 text-sm focus:border-red-500 focus:ring-2 focus:ring-red-100 outline-none"></textarea>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Capturar Evidencia Fotográfica</label>
                <input type="file" id="foto" accept="image/*" capture="environment" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 file:cursor-pointer">
                <div id="previewContainer" class="mt-3 hidden text-center">
                    <img id="imgPreview" class="max-h-44 mx-auto rounded-lg shadow-md border border-slate-300">
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Firma Piloto ROV</label>
                        <button type="button" id="clearPiloto" class="text-xs font-bold text-red-500 hover:text-red-700 hover:underline">Limpiar</button>
                    </div>
                    <canvas id="canvasPiloto" class="signature-canvas w-full h-28 rounded-lg shadow-inner"></canvas>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Firma Encargado de Centro</label>
                        <button type="button" id="clearEncargado" class="text-xs font-bold text-red-500 hover:text-red-700 hover:underline">Limpiar</button>
                    </div>
                    <canvas id="canvasEncargado" class="signature-canvas w-full h-28 rounded-lg shadow-inner"></canvas>
                </div>
            </div>

            <button type="submit" id="btnEnviar" class="w-full bg-blue-900 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:bg-blue-950 active:scale-[0.99] transition duration-150 uppercase tracking-widest text-xs cursor-pointer">
                Enviar Reporte a Supervisor
            </button>
        </form>
    </div>

    <script>
        // URL de Google Apps Script suministrada
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWZla9ukRIpD76UODdLmbt1AjtgddgnEznEIyj0_2NUt5NTEqBT4fHLK4grOgudauGWQ/exec";

        // Asignar por defecto la fecha de hoy en formato local
        document.getElementById('fecha').value = new Date().toISOString().substring(0, 10);

        // Control condicional del campo de texto "Puerto Cerrado"
        const chkPuerto = document.getElementById('puertoCerrado');
        const divObs = document.getElementById('contenedorObservacion');
        const txtObs = document.getElementById('observacion');

        chkPuerto.addEventListener('change', function() {
            if (this.checked) {
                divObs.classList.remove('hidden');
                txtObs.setAttribute('required', 'true');
                txtObs.focus();
            } else {
                divObs.classList.add('hidden');
                txtObs.removeAttribute('required');
                txtObs.value = "";
            }
        });

        // Previsualización y procesamiento de la foto capturada por el técnico
        document.getElementById('foto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('imgPreview');
                    img.src = event.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // Configuración y escalado de los Canvas de Firma
        const cPiloto = document.getElementById('canvasPiloto');
        const cEncargado = document.getElementById('canvasEncargado');

        const padPiloto = new SignaturePad(cPiloto, { backgroundColor: 'rgba(255, 255, 255, 0)', penColor: 'rgb(30, 41, 59)' });
        const padEncargado = new SignaturePad(cEncargado, { backgroundColor: 'rgba(255, 255, 255, 0)', penColor: 'rgb(30, 41, 59)' });

        document.getElementById('clearPiloto').addEventListener('click', () => padPiloto.clear());
        document.getElementById('clearEncargado').addEventListener('click', () => padEncargado.clear());

        function calibrarCanvas() {
            [cPiloto, cEncargado].forEach(canvas => {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
            });
            padPiloto.clear();
            padEncargado.clear();
        }
        window.addEventListener("resize", calibrarCanvas);
        window.addEventListener("DOMContentLoaded", calibrarCanvas);

        // GENERACIÓN DEL PDF Y COMUNICACIÓN CON EL SERVIDOR GOOGLE
        document.getElementById('formBoleta').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (padPiloto.isEmpty() || padEncargado.isEmpty()) {
                alert("⚠️ Error: Ambas firmas (Piloto y Encargado) son obligatorias para validar la boleta.");
                return;
            }

            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "PROCESANDO E INYECTANDO DATOS...";
            btn.classList.replace('bg-blue-900', 'bg-slate-400');

            try {
                const { jsPDF } = window.jspdf;
                const docPdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

                // Extracción de valores actuales
                const varFecha = document.getElementById('fecha').value;
                const varCentro = document.getElementById('centro').value;
                const varFaena = document.querySelector('input[name="tipoFaena"]:checked').value;
                const varPuerto = chkPuerto.checked ? "SÍ" : "NO";
                const varObservacion = txtObs.value;
                const varFoto = document.getElementById('imgPreview').src || "";

                // Diseño Estético del PDF
                docPdf.setFillColor(30, 58, 138); // Azul oscuro institucional
                docPdf.rect(0, 0, 210, 30, 'F');

                docPdf.setTextColor(255, 255, 255);
                docPdf.setFont("helvetica", "bold");
                docPdf.setFontSize(18);
                docPdf.text("PSI ROV & MARÍTIMO SERVICE", 15, 12);
                docPdf.setFontSize(10);
                docPdf.setFont("helvetica", "normal");
                docPdf.text("CONTROL DE BOLETA DE SERVICIO EN TERRENO", 15, 20);

                docPdf.setTextColor(51, 65, 85);
                docPdf.setFontSize(11);
                docPdf.setFont("helvetica", "bold");
                docPdf.text("DETALLES OPERATIVOS", 15, 45);

                docPdf.setFont("helvetica", "normal");
                docPdf.text(`Fecha de Faena: ${varFecha}`, 15, 53);
                docPdf.text(`Centro de Operación: ${varCentro}`, 15, 60);
                docPdf.text(`Tipo de Trabajo Realizado: ${varFaena}`, 15, 67);
                docPdf.text(`Estatus de Puerto Cerrado: ${varPuerto}`, 15, 74);

                let offsetDynamicY = 85;

                // Sección condicional en caso de Puerto Cerrado
                if (chkPuerto.checked && varObservacion) {
                    docPdf.setFillColor(254, 242, 242);
                    docPdf.rect(15, offsetDynamicY, 180, 22, 'F');
                    docPdf.setDrawColor(239, 68, 68);
                    docPdf.rect(15, offsetDynamicY, 180, 22, 'D');
                    
                    docPdf.setTextColor(153, 27, 27);
                    docPdf.setFont("helvetica", "bold");
                    docPdf.text("OBSERVACIÓN TÉCNICA:", 18, offsetDynamicY + 6);
                    docPdf.setFont("helvetica", "italic");
                    docPdf.setFontSize(10);
                    docPdf.text(docPdf.splitTextToSize(varObservacion, 172), 18, offsetDynamicY + 13);
                    offsetDynamicY += 32;
                }

                // Insertar foto en el PDF si existe
                if (varFoto) {
                    docPdf.setTextColor(51, 65, 85);
                    docPdf.setFont("helvetica", "bold");
                    docPdf.setFontSize(11);
                    docPdf.text("EVIDENCIA FOTOGRÁFICA EN TERRENO", 15, offsetDynamicY);
                    try {
                        docPdf.addImage(varFoto, 'JPEG', 15, offsetDynamicY + 4, 75, 55);
                    } catch (e) {
                        docPdf.text("[Error de renderizado de imagen]", 15, offsetDynamicY + 10);
                    }
                    offsetDynamicY += 68;
                }

                // Inserción Paralela de las dos Firmas
                docPdf.setTextColor(51, 65, 85);
                docPdf.setFont("helvetica", "bold");
                docPdf.setFontSize(11);
                docPdf.text("VALIDACIÓN Y CONFORMIDAD", 15, offsetDynamicY);

                const imgFirmaPiloto = padPiloto.toDataURL();
                const imgFirmaEncargado = padEncargado.toDataURL();

                docPdf.addImage(imgFirmaPiloto, 'PNG', 15, offsetDynamicY + 5, 65, 25);
                docPdf.setDrawColor(203, 213, 225);
                docPdf.line(15, offsetDynamicY + 31, 80, offsetDynamicY + 31);
                docPdf.setFontSize(9);
                docPdf.text("FIRMA PILOTO ROV", 15, offsetDynamicY + 36);

                docPdf.addImage(imgFirmaEncargado, 'PNG', 120, offsetDynamicY + 5, 65, 25);
                docPdf.line(120, offsetDynamicY + 31, 185, offsetDynamicY + 31);
                docPdf.text("FIRMA ENCARGADO DE CENTRO", 120, offsetDynamicY + 36);

                // Exportar a String Base64 para adjuntar por correo electrónico
                const pdfStringBase64 = docPdf.output('datauristring');

                // Ensamblaje del JSON Payload para transferir al Apps Script
                const payloadServidor = {
                    fecha: varFecha,
                    centro: varCentro,
                    faena: varFaena,
                    puertoCerrado: varPuerto,
                    observacion: varObservacion,
                    fotoBase64: varFoto,
                    pdfBase64: pdfStringBase64
                };

                // Enviar la información mediante API Fetch hacia el backend de Google Workspace
                const respuesta = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Evita restricciones CORS entre dominios independientes
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadServidor)
                });

                alert("✅ ¡Excelente! Boleta de Servicio enviada con éxito. El supervisor recibirá el correo con el informe adjunto en breve.");
                
                // Resetear interfaz
                document.getElementById('formBoleta').reset();
                document.getElementById('fecha').value = new Date().toISOString().substring(0, 10);
                divObs.classList.add('hidden');
                txtObs.removeAttribute('required');
                document.getElementById('previewContainer').classList.add('hidden');
                padPiloto.clear();
                padEncargado.clear();

            } catch (error) {
                console.error(error);
                alert("❌ Ocurrió un error inesperado al despachar los datos: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "ENVIAR REPORTE A SUPERVISOR";
                btn.classList.replace('bg-slate-400', 'bg-blue-900');
            }
        });
    </script>
</body>
</html>
